[build]
  command = "npm run build:web"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22.13.0"

# Existing Expo static HTML and assets win. Unmatched client-side routes
# still load the app shell so refresh/deep links do not return Netlify 404s.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false
